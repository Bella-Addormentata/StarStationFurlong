<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StarStation Furlong - Core Loop Demo</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        overflow: hidden;
        background-color: #000;
      }
      #app {
        width: 100vw;
        height: 100vh;
      }
      #debug-hud {
        position: absolute;
        top: 10px;
        left: 10px;
        color: #00ff00;
        font-family: 'Courier New', monospace;
        font-size: 14px;
        background-color: rgba(0, 0, 0, 0.7);
        padding: 10px;
        border-radius: 4px;
        pointer-events: none;
        z-index: 1000;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="debug-hud">
      <div>FPS: <span id="fps">--</span></div>
      <div>Position: <span id="position">--</span></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
