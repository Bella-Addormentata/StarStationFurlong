<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StarStation Furlong - Ortho Camera Demo</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        overflow: hidden;
        background-color: #0a2a5e;
      }
      
      /* Canvas container with vignette overlay */
      #app {
        width: 100vw;
        height: 100vh;
        position: relative;
      }

      /* Scale the low-res render buffer to fill the screen without blurring.
         image-rendering: pixelated  — Chromium / Safari
         image-rendering: crisp-edges — Firefox fallback                    */
      #app canvas {
        width: 100vw !important;
        height: 100vh !important;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
      }
      
      /* Subtle vignette to blend edges */
      #app::after {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: radial-gradient(ellipse at center, transparent 0%, rgba(10, 42, 94, 0.20) 70%, rgba(10, 42, 94, 0.50) 100%);
        pointer-events: none;
        z-index: 1;
      }
      
      /* Top status bar - minimalist design */
      #debug-hud {
        position: absolute;
        top: 24px;
        left: 24px;
        color: #d4a84b;
        font-family: 'SF Mono', 'Monaco', 'Consolas', monospace;
        font-size: 12px;
        font-weight: 500;
        background: rgba(4, 8, 22, 0.80);
        padding: 12px 18px;
        border-radius: 12px;
        border: 1px solid rgba(212, 168, 75, 0.18);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        pointer-events: none;
        z-index: 1000;
        backdrop-filter: blur(20px) saturate(180%);
        -webkit-backdrop-filter: blur(20px) saturate(180%);
      }
      
      #debug-hud div {
        margin: 4px 0;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      
      #debug-hud .label {
        color: rgba(212, 168, 75, 0.52);
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      
      #debug-hud .value {
        color: #00d4ff;
        font-weight: 600;
      }
      
      /* Welcome screen with elegant fade */
      #welcome {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: rgba(2, 5, 16, 0.30);
        backdrop-filter: blur(5px);
        -webkit-backdrop-filter: blur(5px);
        z-index: 2000;
        transition: opacity 0.5s ease;
        cursor: pointer;
      }
      
      #welcome-content {
        text-align: center;
        animation: welcomeSlideUp 1s cubic-bezier(0.4, 0.0, 0.2, 1);
      }
      
      #welcome h1 {
        font-size: 56px;
        font-weight: 700;
        margin: 0 0 16px 0;
        letter-spacing: 2px;
        color: #F0C060;
        text-shadow: 0 0 40px rgba(240, 160, 40, 0.55), 0 4px 16px rgba(0, 0, 0, 0.6);
      }
      
      #welcome .subtitle {
        font-size: 16px;
        color: rgba(220, 175, 90, 0.70);
        margin-bottom: 32px;
        letter-spacing: 4px;
        text-transform: uppercase;
      }
      
      #welcome .hint {
        font-size: 14px;
        color: rgba(0, 212, 255, 0.9);
        padding: 8px 20px;
        border: 1px solid rgba(0, 212, 255, 0.3);
        border-radius: 20px;
        display: inline-block;
        background: rgba(0, 212, 255, 0.05);
      }
      
      @keyframes welcomeSlideUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      
      @keyframes pulse {
        0%, 100% {
          transform: translateX(-50%) scale(1);
          opacity: 1;
        }
        50% {
          transform: translateX(-50%) scale(1.05);
          opacity: 0.8;
        }
      }
      
      /* Bottom control hint - floating card style */
      #controls {
        position: absolute;
        bottom: 32px;
        left: 50%;
        transform: translateX(-50%);
        color: #d4a84b;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 13px;
        background: rgba(4, 8, 22, 0.80);
        padding: 16px 28px;
        border-radius: 24px;
        border: 1px solid rgba(212, 168, 75, 0.18);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(20px) saturate(180%);
        -webkit-backdrop-filter: blur(20px) saturate(180%);
        z-index: 1000;
        display: flex;
        align-items: center;
        gap: 16px;
      }
      
      .keys-group {
        display: flex;
        gap: 6px;
      }
      
      .key {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 32px;
        height: 32px;
        padding: 0 10px;
        background: rgba(212, 168, 75, 0.10);
        border: 1px solid rgba(212, 168, 75, 0.28);
        border-radius: 6px;
        font-weight: 600;
        font-size: 13px;
        color: #d4a84b;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(212, 168, 75, 0.12);
        transition: all 0.2s ease;
      }
      
      .control-text {
        color: rgba(212, 168, 75, 0.65);
        font-size: 13px;
      }
      
      /* Ambient corner glow effects */
      .corner-glow {
        position: absolute;
        width: 300px;
        height: 300px;
        border-radius: 50%;
        pointer-events: none;
        z-index: 0;
        filter: blur(80px);
        opacity: 0.15;
      }
      
      .corner-glow.top-left {
        top: -100px;
        left: -100px;
        background: radial-gradient(circle, #00d4ff 0%, transparent 70%);
      }
      
      .corner-glow.bottom-right {
        bottom: -100px;
        right: -100px;
        background: radial-gradient(circle, #e08820 0%, transparent 70%);
      }
    </style>
  </head>
  <body>
    <!-- Ambient corner glows -->
    <div class="corner-glow top-left"></div>
    <div class="corner-glow bottom-right"></div>
    
    <!-- 3D Canvas -->
    <div id="app"></div>
    
    <!-- Welcome overlay -->
    <div id="welcome">
      <div id="welcome-content">
        <h1>STARSTATION FURLONG</h1>
        <div class="subtitle">Ortho Camera Demo</div>
        <div class="hint" style="animation: pulse 2s ease-in-out infinite;">👆 Click to Enter</div>
      </div>
    </div>
    
    <!-- Debug HUD -->
    <div id="debug-hud">
      <div>
        <span class="label">FPS</span>
        <span class="value" id="fps">--</span>
      </div>
      <div>
        <span class="label">CAM</span>
        <span class="value">ORTHO · LOCKED</span>
      </div>
    </div>
    
    <!-- Control hints -->
    <div id="controls">
      <div class="keys-group">
        <span class="key">W</span>
        <span class="key">A</span>
        <span class="key">S</span>
        <span class="key">D</span>
      </div>
      <span class="control-text">Move</span>
    </div>
    
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
