name: "🚀 Publish Sovereign Releases"

on:
  push:
    # Trigger when tags matching vX.Y.Z are pushed (supporting multi-digit places, e.g. v10.20.30)
    # (e.g., v0.1.0, v1.12.3, v10.20.30)
    # Uses standard GitHub Action glob filter syntax: [0-9]* matches any number of digits starting with a digit.
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*'

env:
  # 🎯 WHICH PROTOTYPE THE RELEASE SHIPS AS THE APP FRONTEND.
  # The Tauri shell (window, Rust node, icons, app version) always comes from
  # prototypes/0.22.0-core-loop-demo/src-tauri — only the rendered frontend swaps.
  # To release a different demo:
  #   1. Point this at the demo folder (e.g. prototypes/0.0.4-navigation-demo).
  #   2. Make sure that folder has a committed package-lock.json and a
  #      `npm run build` script that outputs to its local dist/.
  #   3. Commit, then push a vX.Y.Z tag as usual.
  RELEASE_FRONTEND: prototypes/0.29.0-core-loop-demo

jobs:
  # ── Stage 1: create ONE shared draft release ─────────────────────────────
  # tauri-action cannot reliably find draft releases by tag (drafts are not
  # addressable via get-release-by-tag), so letting each matrix job create or
  # find the draft races and scatters the installers across duplicate drafts.
  # Instead we create the draft exactly once here and hand its id to every
  # platform job.
  create-release:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    outputs:
      release_id: ${{ steps.create.outputs.result }}
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      # Extract this release's notes (top version section of CHANGELOG.md) for the release body.
      # Matches the first `## v...` heading so the `## Unreleased` stub is skipped
      # (pre-v0.16.0 releases shipped the Unreleased stub as their body by mistake).
      - name: 📝 Extract release notes from CHANGELOG.md
        shell: bash
        run: |
          awk '/^## v/{n++; next} n==1{print}' CHANGELOG.md > RELEASE_NOTES.md
          if [ ! -s RELEASE_NOTES.md ]; then
            echo "Sovereign P2P Space MMO - Production build stable release ${GITHUB_REF_NAME}. See CHANGELOG.md." > RELEASE_NOTES.md
          fi

      - name: 🎫 Create shared draft release
        id: create
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const tag = context.ref.replace('refs/tags/', '');
            const body = fs.readFileSync('RELEASE_NOTES.md', 'utf8');

            // Clean up stale DRAFT releases for this tag left by earlier
            // partial/failed runs. Published releases are never touched.
            const releases = await github.paginate(github.rest.repos.listReleases, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });
            for (const r of releases.filter((r) => r.draft && r.tag_name === tag)) {
              core.info(`Deleting stale draft release ${r.id} (${r.name})`);
              await github.rest.repos.deleteRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: r.id,
              });
            }

            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `StarStation Furlong ${tag}`,
              body,
              draft: true, // published by finalize-release ONLY after every artifact is attached
              prerelease: false,
            });
            core.info(`Created draft release ${data.id}: ${data.html_url}`);
            return data.id;

  # ── Stage 2: build every platform and upload into the shared draft ───────
  publish-tauri-binaries:
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest' # Apple Silicon & Intel macOS Universal
            args: ''
          - platform: 'ubuntu-22.04' # Ubuntu Debian & AppImage
            args: ''
          - platform: 'windows-latest' # Windows MSI and NSIS installers
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      # 1. Setup Node.js runtimes for Vite/Three.js frontend compilations
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: '${{ env.RELEASE_FRONTEND }}/package-lock.json'

      # 2. Setup stable Rust toolchains for our sovereign backbones
      - name: 🦀 Setup Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      # Rust cache to drastically improve consecutive build durations
      - name: 💾 Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            ${{ env.RELEASE_FRONTEND }}/src-tauri -> target
            ${{ env.RELEASE_FRONTEND }}/ssf-p2p-node -> target

      # 3. Install platform-specific compiler dependencies (Webkit/GTK libraries for Linux)
      - name: 🔧 Install System Dependencies (Linux only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      # 4. Install dependencies and build the SELECTED frontend (env.RELEASE_FRONTEND)
      - name: 📦 Install & Build Frontend (${{ env.RELEASE_FRONTEND }})
        shell: bash
        run: |
          cd "$RELEASE_FRONTEND"
          npm ci
          npm run build

      # 4b. Build the sovereign P2P node for THIS platform and stage it where
      #     the Tauri bundler expects external binaries (bundle.externalBin):
      #     src-tauri/binaries/ssf-p2p-node-<host-triple>[.exe]. The installer
      #     then places it next to the app executable, where the app's spawn
      #     probe already looks first — no separate download needed.
      #     ⛔ macOS: skipped — the v0.20.0 run showed the mac bundler failing
      #     with externalBin while Windows/Linux built clean; mac keeps the
      #     standalone-node flow until that failure is reproduced with logs.
      - name: 🛰️ Build & stage bundled P2P node sidecar
        if: matrix.platform != 'macos-latest'
        shell: bash
        run: |
          cargo build --release --manifest-path "$RELEASE_FRONTEND/ssf-p2p-node/Cargo.toml"
          triple=$(rustc -vV | sed -n 's/^host: //p')
          mkdir -p "$RELEASE_FRONTEND/src-tauri/binaries"
          if [ -f "$RELEASE_FRONTEND/ssf-p2p-node/target/release/ssf-p2p-node.exe" ]; then
            cp "$RELEASE_FRONTEND/ssf-p2p-node/target/release/ssf-p2p-node.exe" \
               "$RELEASE_FRONTEND/src-tauri/binaries/ssf-p2p-node-$triple.exe"
          else
            cp "$RELEASE_FRONTEND/ssf-p2p-node/target/release/ssf-p2p-node" \
               "$RELEASE_FRONTEND/src-tauri/binaries/ssf-p2p-node-$triple"
          fi
          ls -la "$RELEASE_FRONTEND/src-tauri/binaries"

      # 5. Point the shared Tauri shell at the selected frontend's dist/.
      #    Written as a JSON overlay merged into tauri.conf.json via `--config`;
      #    the before-build hook becomes a no-op because step 4 already built it.
      #    On macOS the overlay also strips bundle.externalBin (see step 4b note).
      - name: 🔀 Select release frontend for Tauri shell
        shell: bash
        run: |
          name="${RELEASE_FRONTEND##*/}"
          if [ "${{ matrix.platform }}" = "macos-latest" ]; then
            extra=', "bundle": { "externalBin": [] }'
          else
            extra=''
          fi
          cat > "$RELEASE_FRONTEND/release-frontend.json" <<EOF
          {
            "build": {
              "beforeBuildCommand": "echo frontend prebuilt by workflow",
              "frontendDist": "../../${name}/dist"
            }${extra}
          }
          EOF
          echo "Tauri config overlay:" && cat "$RELEASE_FRONTEND/release-frontend.json"

      # 6. Run Rust Cargo builds & upload installers into the shared draft release
      - name: 🛠️ Build & Package Tauri Application
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          projectPath: ${{ env.RELEASE_FRONTEND }}
          args: --config release-frontend.json ${{ matrix.args }}

  # ── Stage 2b: build the sovereign P2P node and attach it to the same draft ─
  # The node is ALSO bundled inside every installer via bundle.externalBin
  # (staged in step 4b above), so fresh installs need no separate download.
  # This standalone asset remains for headless/always-on node operators
  # (reachable members, future beacons) and for patching older installs.
  # Independent job: if it fails, the installers above are unaffected.
  publish-p2p-node:
    needs: create-release
    permissions:
      contents: write
    runs-on: windows-latest # MSVC — the GNU dev-profile linker wall does not apply
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🦀 Setup Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: 💾 Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: '${{ env.RELEASE_FRONTEND }}/ssf-p2p-node -> target'

      - name: 🛰️ Build sovereign P2P node (release)
        shell: bash
        run: cargo build --release --manifest-path "$RELEASE_FRONTEND/ssf-p2p-node/Cargo.toml"

      - name: ⬆️ Upload node binary to the shared draft release
        uses: actions/github-script@v7
        env:
          NODE_EXE: ${{ env.RELEASE_FRONTEND }}/ssf-p2p-node/target/release/ssf-p2p-node.exe
        with:
          script: |
            const fs = require('fs');
            const data = fs.readFileSync(process.env.NODE_EXE);
            await github.rest.repos.uploadReleaseAsset({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: Number('${{ needs.create-release.outputs.release_id }}'),
              name: 'ssf-p2p-node.exe', // exact name the app's exe-adjacent spawn probe looks for
              data,
              headers: {
                'content-type': 'application/octet-stream',
                'content-length': data.length,
              },
            });
            core.info(`Uploaded ssf-p2p-node.exe (${data.length} bytes)`);

  # ── Stage 3: publish the draft ONLY when every artifact is attached ──────
  # This repository has IMMUTABLE releases: publishing freezes the asset list
  # permanently, so publishing mid-run bricks the version (v0.20.0 was lost
  # exactly this way — published while builds were still uploading, leaving an
  # empty, undeletable release). Never publish the draft manually; this job
  # flips it once all installer jobs and the node asset are in. If anything
  # fails upstream, the draft stays a draft and the tag can be re-run safely.
  finalize-release:
    needs: [create-release, publish-tauri-binaries, publish-p2p-node]
    permissions:
      contents: write
    runs-on: ubuntu-22.04
    steps:
      - name: 🚀 Publish release (all artifacts green)
        uses: actions/github-script@v7
        with:
          script: |
            const release_id = Number('${{ needs.create-release.outputs.release_id }}');
            const { data: rel } = await github.rest.repos.getRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id,
            });
            // Sanity floor: 3 platform installer sets + standalone node exe.
            // Guards against publishing (immutably!) a half-populated release.
            if (rel.assets.length < 6) {
              core.setFailed(`Refusing to publish: only ${rel.assets.length} assets attached (expected >= 6). Draft left intact.`);
              return;
            }
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id,
              draft: false,
            });
            core.info(`Published release ${rel.tag_name} with ${rel.assets.length} assets.`);
